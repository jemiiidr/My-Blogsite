<svg
	xmlns="http://www.w3.org/2000/svg"
	viewBox="0 0 1600 1000"
	role="img"
	aria-labelledby="title description"
>
	<title id="title">Story cover placeholder</title>
	<desc id="description">
		A decorative gradient displayed when no cover image is selected.
	</desc>

	<defs>
		<linearGradient
			id="background"
			x1="0"
			y1="0"
			x2="1"
			y2="1"
		>
			<stop offset="0%" stop-color="#7157f6" />
			<stop offset="52%" stop-color="#9c86ff" />
			<stop offset="100%" stop-color="#18181b" />
		</linearGradient>

		<radialGradient
			id="glow"
			cx="50%"
			cy="35%"
			r="65%"
		>
			<stop
				offset="0%"
				stop-color="#ffffff"
				stop-opacity="0.32"
			/>
			<stop
				offset="100%"
				stop-color="#ffffff"
				stop-opacity="0"
			/>
		</radialGradient>
	</defs>

	<rect
		width="1600"
		height="1000"
		fill="url(#background)"
	/>

	<rect
		width="1600"
		height="1000"
		fill="url(#glow)"
	/>

	<circle
		cx="240"
		cy="180"
		r="250"
		fill="#ffffff"
		fill-opacity="0.08"
	/>

	<circle
		cx="1400"
		cy="820"
		r="380"
		fill="#ffffff"
		fill-opacity="0.06"
	/>

	<path
		d="M0 760 C320 590 530 900 850 700 C1120 530 1300 760 1600 600 V1000 H0 Z"
		fill="#111318"
		fill-opacity="0.28"
	/>

	<text
		x="800"
		y="480"
		text-anchor="middle"
		fill="#ffffff"
		font-family="Arial, sans-serif"
		font-size="64"
		font-weight="700"
	>
		Your Story
	</text>

	<text
		x="800"
		y="555"
		text-anchor="middle"
		fill="#ffffff"
		fill-opacity="0.78"
		font-family="Arial, sans-serif"
		font-size="28"
	>
		Choose a cover image
	</text>
</svg>